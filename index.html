<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учебник</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#090909;--surface:#111;--border:#252525;--accent:#d7d1c5;--accent2:#7dd3a4;--text:#f4f1ea;--muted:#9c968b}
body{background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;letter-spacing:0;overflow-x:hidden}
header{width:100%;max-width:1040px;padding:58px 20px 0}
.label{font-family:'Unbounded',sans-serif;font-size:12px;letter-spacing:.08em;color:var(--muted);margin-bottom:18px}
h1{font-family:'Unbounded',sans-serif;max-width:760px;font-size:clamp(2.4rem,6vw,5.4rem);font-weight:900;line-height:.98;color:var(--text);margin-bottom:12px}
main{width:100%;max-width:1040px;padding:0 20px 80px}
.semester-block{margin-top:46px;margin-bottom:48px}
.semester-header{display:flex;align-items:center;gap:18px;margin-bottom:16px}
.semester-badge{font-family:'Unbounded',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.semester-line{flex:1;height:1px;background:var(--border)}
.subjects{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.subject-card{display:block;min-height:168px;text-decoration:none;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:22px;transition:border-color .16s,transform .16s,background .16s;position:relative;overflow:hidden}
.subject-card:hover{border-color:#6d675f;transform:translateY(-2px);background:#151515}
.card-icon{width:38px;height:38px;display:grid;place-items:center;border-radius:6px;background:#181818;border:1px solid #2c2c2c;font-size:23px;margin-bottom:24px}
.card-title{font-family:'Unbounded',sans-serif;font-size:clamp(14px,1.08vw,16px);font-weight:700;line-height:1.35;color:var(--text);margin-bottom:6px}
.card-meta{font-size:13px;line-height:1.5;color:var(--muted)}
.card-arrow{position:absolute;top:18px;right:18px;font-size:18px;color:var(--muted);transition:color .16s}
.subject-card:hover .card-arrow{color:var(--text)}
footer{color:#5f5a54;font-size:12px;padding-bottom:32px}
@media(max-width:720px){header{padding:38px 18px 0}main{padding:0 18px 56px}h1{font-size:clamp(2.3rem,13vw,4rem)}.semester-header{gap:12px}.subjects{grid-template-columns:1fr}.subject-card{min-height:144px}}</style>
</head>
<body>

  <header>
    <p class="label">67</p>
    <h1>предметы тесты и все такое</h1>
  </header>

  <main>

    <div class="semester-block">
      <div class="semester-header">
        <span class="semester-badge">1 курс · 2 семестр</span>
        <div class="semester-line"></div>
      </div>
      <div class="subjects">

        <a href="physicss67.html" class="subject-card">
          <span class="card-icon">⚛️</span>
          <div class="card-title">Физика</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

        <a href="ikt.html" class="subject-card">
          <span class="card-icon">💻</span>
          <div class="card-title">ИКТ</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

        <a href="ofg.html" class="subject-card">
          <span class="card-icon">💰</span>
          <div class="card-title">ОФГ</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

        <a href="tp.html" class="subject-card">
          <span class="card-icon">🦾</span>
          <div class="card-title">Технология программирования</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

      </div>
    </div>

    <!-- Сюда можно добавить другие семестры -->

  </main>

  <footer>....</footer>

</body>
</html>
