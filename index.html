<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Учебник</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0f14; --surface: #161a23; --border: #232840; --accent: #4f7cff; --accent2: #a78bfa; --text: #e8eaf2; --muted: #7b82a0; }
    body { background: var(--bg); color: var(--text); font-family: 'Mulish', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.4; pointer-events: none; z-index: 0; }
    header { position: relative; z-index: 1; width: 100%; max-width: 860px; padding: 60px 24px 0; }
    .label { font-family: 'Unbounded', sans-serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    h1 { font-family: 'Unbounded', sans-serif; font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; line-height: 1.1; background: linear-gradient(135deg, #fff 30%, var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
    main { position: relative; z-index: 1; width: 100%; max-width: 860px; padding: 0 24px 80px; }
    .semester-block { margin-bottom: 48px; }
    .semester-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .semester-badge { font-family: 'Unbounded', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); background: rgba(79,124,255,.1); border: 1px solid rgba(79,124,255,.25); border-radius: 8px; padding: 5px 12px; white-space: nowrap; }
    .semester-line { flex: 1; height: 1px; background: var(--border); }
    .subjects { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .subject-card { display: block; text-decoration: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; transition: border-color .2s, transform .2s, box-shadow .2s; position: relative; overflow: hidden; }
    .subject-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent) 0%, transparent 60%); opacity: 0; transition: opacity .3s; border-radius: 16px; }
    .subject-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 16px 48px rgba(79,124,255,.15); }
    .subject-card:hover::before { opacity: 0.06; }
    .card-icon { font-size: 36px; margin-bottom: 16px; display: block; }
    .card-title { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .card-meta { font-size: 13px; color: var(--muted); }
    .card-arrow { position: absolute; top: 24px; right: 24px; font-size: 20px; color: var(--accent); opacity: 0; transform: translateX(-6px); transition: opacity .2s, transform .2s; }
    .subject-card:hover .card-arrow { opacity: 1; transform: translateX(0); }
    footer { position: relative; z-index: 1; color: var(--muted); font-size: 12px; padding-bottom: 32px; }
  </style>
</head>
<body>

  <header>
    <p class="label">67</p>
    <h1>предметы тесты и все такое</h1>
  </header>

  <main>

    <div class="semester-block">
      <div class="semester-header">
        <span class="semester-badge">1 курс · 2 семестр</span>
        <div class="semester-line"></div>
      </div>
      <div class="subjects">

        <a href="physicss67.html" class="subject-card">
          <span class="card-icon">⚛️</span>
          <div class="card-title">Физика</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

        <a href="ikt.html" class="subject-card">
          <span class="card-icon">💻</span>
          <div class="card-title">ИКТ</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

        <a href="ofg.html" class="subject-card">
          <span class="card-icon">💰</span>
          <div class="card-title">ОФГ</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

        <a href="tp.html" class="subject-card">
          <span class="card-icon">🦾</span>
          <div class="card-title">Технология программирования</div>
          <div class="card-meta">Вопросы и ответы</div>
          <span class="card-arrow">→</span>
        </a>

      </div>
    </div>

    <!-- Сюда можно добавить другие семестры -->

  </main>

  <footer>....</footer>

<style>
/* DESIGN REFRESH */
:root{--bg:#090c12;--surface:#141923;--border:rgba(145,160,185,.22);--accent:#22d3ee;--accent2:#34d399;--text:#f3f6fb;--muted:#9aa5b8}
body{background:linear-gradient(145deg,#070910 0%,#101722 46%,#0b1016 100%);letter-spacing:0;overflow-x:hidden}
body::before{background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:52px 52px;opacity:.8;mask-image:linear-gradient(to bottom,#000 0%,transparent 96%)}
body::after{content:'';position:fixed;inset:0;background:linear-gradient(120deg,rgba(34,211,238,.08),transparent 34%,rgba(245,158,11,.05) 70%,rgba(52,211,153,.08));pointer-events:none;z-index:0}
header,main,footer{position:relative;z-index:1}
header,main{max-width:1120px}
header{padding-top:72px}
.label{display:inline-flex;align-items:center;height:28px;padding:0 11px;border:1px solid rgba(34,211,238,.28);border-radius:8px;background:rgba(34,211,238,.08);letter-spacing:2px}
h1{max-width:880px;background:linear-gradient(135deg,#fff 18%,var(--accent) 54%,var(--accent2));-webkit-background-clip:text;background-clip:text;text-wrap:balance}
.semester-block{margin-top:34px}
.semester-header{margin-bottom:20px}
.semester-badge{border-radius:8px;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.semester-line{background:linear-gradient(90deg,rgba(34,211,238,.38),transparent)}
.subjects{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}
.subject-card{min-height:178px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border-color:rgba(255,255,255,.1);box-shadow:0 18px 48px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.08)}
.subject-card::before{inset:auto 0 0;height:3px;border-radius:0;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:1}
.subject-card:hover{border-color:rgba(34,211,238,.42);transform:translateY(-5px);box-shadow:0 24px 70px rgba(0,0,0,.34),0 0 0 1px rgba(34,211,238,.14)}
.card-icon{width:46px;height:46px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:28px}
.card-title{font-size:clamp(14px,1.14vw,17px);line-height:1.35;overflow-wrap:normal;word-break:normal}
.card-meta{color:var(--muted);line-height:1.5}
.card-arrow{top:22px;right:22px;width:32px;height:32px;display:grid;place-items:center;border-radius:8px;background:rgba(34,211,238,.09);border:1px solid rgba(34,211,238,.22);opacity:1;transform:none}
footer{opacity:.75}
@media(max-width:720px){
  header{padding:46px 18px 0}
  main{padding:0 18px 56px}
  h1{font-size:clamp(2rem,10vw,3.2rem)}
  .subjects{grid-template-columns:1fr}
  .subject-card{min-height:156px;padding:24px 20px}
}
</style>
<style>
/* MINIMAL DARK THEME */
:root{--bg:#090909;--surface:#111;--border:#252525;--accent:#d7d1c5;--accent2:#7dd3a4;--text:#f4f1ea;--muted:#9c968b}
body{background:#090909;color:var(--text)}
body::before,body::after{display:none!important}
header,main{max-width:1040px}
header{padding-top:58px}
.label{height:auto;padding:0;background:transparent;border:0;border-radius:0;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:none}
h1{max-width:760px;margin-top:18px;background:none;-webkit-text-fill-color:var(--text);color:var(--text);font-size:clamp(2.4rem,6vw,5.4rem);line-height:.98;letter-spacing:0}
.semester-block{margin-top:46px}
.semester-header{gap:18px;margin-bottom:16px}
.semester-badge{padding:0;background:transparent;border:0;box-shadow:none;color:var(--muted);font-size:11px;letter-spacing:.08em}
.semester-line{height:1px;background:#252525}
.subjects{grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.subject-card{min-height:168px;padding:22px;border-radius:6px;background:#111;border-color:#252525;box-shadow:none}
.subject-card::before{display:none}
.subject-card:hover{border-color:#6d675f;transform:translateY(-2px);box-shadow:none;background:#151515}
.card-icon{width:38px;height:38px;border-radius:6px;background:#181818;border-color:#2c2c2c;font-size:23px}
.card-title{margin-top:24px;color:var(--text);font-size:clamp(14px,1.08vw,16px);font-weight:700}
.card-meta{color:var(--muted);font-size:13px}
.card-arrow{top:18px;right:18px;width:auto;height:auto;background:transparent;border:0;color:var(--muted);font-size:18px}
.subject-card:hover .card-arrow{color:var(--text)}
footer{color:#5f5a54}
@media(max-width:720px){
  header{padding-top:38px}
  h1{font-size:clamp(2.3rem,13vw,4rem)}
  .subject-card{min-height:144px}
}
</style>
</body>
</html>
